name: Build & Release

# Tag yaratilganda ishga tushadi: git tag v1.0.0 && git push --tags
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (masalan v1.2.3)'
        required: true
        default: 'v1.0.0'

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'
  FLUTTER_VERSION: '3.19.0'

jobs:
  # ============================================================
  # 1. Windows EXE — matrix build (pos, kitchen, waiter)
  # ============================================================
  build-windows:
    name: "Windows EXE — ${{ matrix.app }}"
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: pos
            label: "POS Kassa"
            setup_name: "Oshxona-POS-Setup"
          - app: kitchen
            label: "Oshxona Kitchen"
            setup_name: "Oshxona-Kitchen-Setup"
          - app: waiter
            label: "Ofitsiant Waiter"
            setup_name: "Oshxona-Waiter-Setup"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Root dependencies
        run: npm install --legacy-peer-deps
        working-directory: .

      - name: App dependencies
        run: npm install --legacy-peer-deps
        working-directory: apps/${{ matrix.app }}

      - name: Version'ni olish
        id: get_version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: package.json version yangilash
        shell: bash
        working-directory: apps/${{ matrix.app }}
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          VERSION="${VERSION#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version || true

      - name: Vite build
        working-directory: apps/${{ matrix.app }}
        run: npm run build

      - name: Electron-builder (Windows NSIS)
        working-directory: apps/${{ matrix.app }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if (Test-Path "electron-builder.json") {
            npx electron-builder --win --config electron-builder.json
          } else {
            npx electron-builder --win
          }
        shell: pwsh

      - name: EXE faylni topish
        id: find_exe
        shell: bash
        working-directory: apps/${{ matrix.app }}
        run: |
          EXE=$(find release -name "*.exe" | head -1 2>/dev/null || find ../../release/windows/${{ matrix.app }} -name "*.exe" | head -1 2>/dev/null || echo "")
          if [[ -z "$EXE" ]]; then
            EXE=$(find . -name "*Setup*.exe" | head -1)
          fi
          echo "EXE_PATH=$EXE" >> $GITHUB_OUTPUT
          echo "Found: $EXE"

      - name: EXE ni artifact sifatida saqlash
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.app }}-${{ steps.get_version.outputs.VERSION }}
          path: |
            apps/${{ matrix.app }}/release/**/*.exe
            release/windows/${{ matrix.app }}/**/*.exe
          if-no-files-found: warn
          retention-days: 7

  # ============================================================
  # 2. Android APK — matrix build (flutter-pos, waiter_flutter)
  # ============================================================
  build-android:
    name: "Android APK — ${{ matrix.app }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: waiter_flutter
            label: "Waiter Flutter"
            apk_name: "oshxona-waiter-release.apk"
            out_dir: "release/android/waiter"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Flutter version tekshirish
        run: flutter --version

      - name: flutter pub get
        working-directory: apps/${{ matrix.app }}
        run: flutter pub get

      - name: Version olish
        id: get_version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: pubspec.yaml version yangilash
        working-directory: apps/${{ matrix.app }}
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          VERSION="${VERSION#v}"
          BUILD_NUM=$(echo "$VERSION" | tr -d '.' | sed 's/^0*//')
          sed -i "s/^version: .*/version: ${VERSION}+${BUILD_NUM:-1}/" pubspec.yaml

      - name: Keystore (release signing)
        if: secrets.KEYSTORE_BASE64 != ''
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > apps/${{ matrix.app }}/android/app/release.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: key.properties yaratish
        if: secrets.KEYSTORE_BASE64 != ''
        run: |
          cat > apps/${{ matrix.app }}/android/key.properties << EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release.jks
          EOF

      - name: flutter build apk --release
        working-directory: apps/${{ matrix.app }}
        run: flutter build apk --release

      - name: APK ni ko'chirish
        run: |
          mkdir -p ${{ matrix.out_dir }}
          cp apps/${{ matrix.app }}/build/app/outputs/flutter-apk/app-release.apk \
             ${{ matrix.out_dir }}/${{ matrix.apk_name }}
          ls -lh ${{ matrix.out_dir }}/

      - name: APK artifact saqlash
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.app }}-${{ steps.get_version.outputs.VERSION }}
          path: ${{ matrix.out_dir }}/${{ matrix.apk_name }}
          if-no-files-found: warn
          retention-days: 7

  # ============================================================
  # 3. GitHub Release yaratish
  # ============================================================
  create-release:
    name: "GitHub Release yaratish"
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Version olish
        id: get_version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Barcha artifactlarni yuklash
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Fayl ro'yxati
        run: find release-artifacts -type f | sort

      - name: GitHub Release yaratish
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: "Oshxona POS ${{ steps.get_version.outputs.VERSION }}"
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.VERSION, 'beta') || contains(steps.get_version.outputs.VERSION, 'alpha') }}
          generate_release_notes: true
          body: |
            ## Oshxona POS ${{ steps.get_version.outputs.VERSION }}

            ### Windows EXE Installer
            | Ilova | Fayl |
            |-------|------|
            | POS Kassa | `Oshxona-POS-Setup-*.exe` |
            | Oshxona Ekrani | `Oshxona-Kitchen-Setup-*.exe` |
            | Ofitsiant | `Oshxona-Waiter-Setup-*.exe` |

            ### Android APK
            | Ilova | Fayl |
            |-------|------|
            | Waiter | `oshxona-waiter-release.apk` |

            ### O'rnatish
            **Windows:** EXE faylni yuklab, ishga tushiring.
            **Android:** APK ni telefonga yuklab, "Noma'lum manbadan o'rnatish" ni yoqib o'rnating.

            ### API sozlash
            1. `apps/*/src/services/api.ts` da `VITE_API_URL` ni server manziliga o'zgartiring
            2. Qayta build qiling
          files: |
            release-artifacts/**/*.exe
            release-artifacts/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # 4. Build xabar (Telegram)
  # ============================================================
  notify:
    name: "Xabar yuborish"
    needs: [create-release]
    runs-on: ubuntu-latest
    if: always() && vars.TELEGRAM_NOTIFY == 'true'

    steps:
      - name: Status aniqlash
        id: status
        run: |
          if [[ "${{ needs.create-release.result }}" == "success" ]]; then
            echo "MSG=✅ Build muvaffaqiyatli! Version: ${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "MSG=❌ Build xato bilan tugadi. Branch: ${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Telegram xabar
        if: env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
        run: |
          curl -sf -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${{ steps.status.outputs.MSG }}%0A%0ARelease: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}" \
            -d "parse_mode=HTML"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
