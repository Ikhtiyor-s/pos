# Production docker-compose — GitHub Actions CI/CD uchun
# Ishlatish: BACKEND_TAG=abc1234 FRONTEND_TAG=abc1234 docker compose -f docker-compose.prod.yml up -d

version: '3.8'

services:
  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: oshxona-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      POSTGRES_DB: ${POSTGRES_DB:-oshxona_pos}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - oshxona-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-oshxona_pos}']
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: oshxona-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - oshxona-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Backend API ─────────────────────────────────────────────────────────────
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/OWNER/oshxona-pos/backend}:${BACKEND_TAG:-latest}
    container_name: oshxona-backend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3000
      REDIS_URL: redis://redis:6379
    volumes:
      - backend_uploads:/app/apps/api/uploads
    networks:
      - oshxona-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512m
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # ─── POS Frontend (nginx) ────────────────────────────────────────────────────
  pos:
    image: ${FRONTEND_IMAGE:-ghcr.io/OWNER/oshxona-pos/frontend}:${FRONTEND_TAG:-latest}
    container_name: oshxona-pos
    restart: unless-stopped
    ports:
      - "${POS_PORT:-80}:80"
      - "${POS_SSL_PORT:-443}:443"
    volumes:
      - ./nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - ssl_certs:/etc/ssl/certs:ro
    networks:
      - oshxona-network
    depends_on:
      backend:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  oshxona-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
  ssl_certs:
