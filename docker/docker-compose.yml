version: '3.8'

services:
  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: oshxona-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: oshxona
      POSTGRES_PASSWORD: oshxona_secret_2024
      POSTGRES_DB: oshxona_pos
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - oshxona-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U oshxona -d oshxona_pos']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: oshxona-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - oshxona-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    container_name: oshxona-backend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://oshxona:oshxona_secret_2024@postgres:5432/oshxona_pos
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: oshxona-jwt-secret-change-in-production
      JWT_REFRESH_SECRET: oshxona-refresh-secret-change-in-production
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:5174
    volumes:
      - backend_uploads:/app/backend/uploads
    networks:
      - oshxona-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── POS Frontend ────────────────────────────────────────────────────────────
  pos:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    container_name: oshxona-pos
    restart: unless-stopped
    ports:
      - '5174:80'
    networks:
      - oshxona-network
    depends_on:
      - backend

  # ─── Adminer (DB boshqaruvi) ──────────────────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: oshxona-adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    networks:
      - oshxona-network
    depends_on:
      - postgres
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha-dark

networks:
  oshxona-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_uploads:
    driver: local
