version: '3.8'

services:
  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: oshxona-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: oshxona
      POSTGRES_PASSWORD: oshxona_secret_2024
      POSTGRES_DB: oshxona_pos
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - oshxona-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U oshxona -d oshxona_pos']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: oshxona-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - oshxona-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    container_name: oshxona-backend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://oshxona:oshxona_secret_2024@postgres:5432/oshxona_pos
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: oshxona-jwt-secret-change-in-production
      JWT_REFRESH_SECRET: oshxona-refresh-secret-change-in-production
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:5174,http://localhost:5176,capacitor://localhost,https://localhost,http://192.168.1.19:3000,http://192.168.1.19:5174
    volumes:
      - backend_uploads:/app/apps/api/uploads
    networks:
      - oshxona-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── POS Frontend ────────────────────────────────────────────────────────────
  pos:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_API_URL: /api
        VITE_TENANT_ID: 0f17da38-bc59-4bd1-ab22-949f1696254c
    container_name: oshxona-pos
    restart: unless-stopped
    ports:
      - '4000:80'
    networks:
      - oshxona-network
    depends_on:
      - backend


networks:
  oshxona-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_uploads:
    driver: local
