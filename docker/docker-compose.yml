version: '3.8'

services:
  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: oshxona-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oshxona}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD .env da o'rnatilishi shart}
      POSTGRES_DB: ${POSTGRES_DB:-oshxona_pos}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - oshxona-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U oshxona -d oshxona_pos']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: oshxona-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - oshxona-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    container_name: oshxona-backend
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL .env da o'rnatilishi shart}
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET .env da o'rnatilishi shart}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET .env da o'rnatilishi shart}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:4000}
    volumes:
      - backend_uploads:/app/apps/api/uploads
    networks:
      - oshxona-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── POS Frontend ────────────────────────────────────────────────────────────
  pos:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_API_URL: /api
        VITE_TENANT_ID: 004f93b4-05d1-4abf-a165-aa6ff5c2a5b2
    container_name: oshxona-pos
    restart: unless-stopped
    ports:
      - '4000:80'
    networks:
      - oshxona-network
    depends_on:
      - backend


networks:
  oshxona-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_uploads:
    driver: local
