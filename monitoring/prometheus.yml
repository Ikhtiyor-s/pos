global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s
  external_labels:
    environment: production
    app: oshxona-pos

# Alert rules fayli
rule_files:
  - "alerts.yml"

# Alertmanager
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# ============================================================
# SCRAPE CONFIGS
# ============================================================
scrape_configs:

  # ── Prometheus o'zi ────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # ── Oshxona API ────────────────────────────────────────────
  - job_name: oshxona-api
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ['backend:3000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: oshxona-api

  # ── Node Exporter (server metriclar) ───────────────────────
  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']
    relabel_configs:
      - source_labels: [__address__]
        regex: '([^:]+).*'
        target_label: hostname
        replacement: '$1'

  # ── PostgreSQL Exporter ────────────────────────────────────
  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']

  # ── Redis Exporter ─────────────────────────────────────────
  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']

  # ── Nginx (agar mavjud bo'lsa) ─────────────────────────────
  # - job_name: nginx
  #   static_configs:
  #     - targets: ['nginx-exporter:9113']
